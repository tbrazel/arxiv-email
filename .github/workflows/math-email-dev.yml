name: math-email-dev

on:
  push:
    branches:
      - dev

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

      - name: checkout repo content
        uses: actions/checkout@v5 # checkout the repository content to github runner

      - name: setup python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x' # install the python version needed
          
      - name: install python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: execute py script # run sj-gobierno.py to get the latest data
        env: 
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          RECIPIENT: ${{ secrets.RECIPIENT }}
        run: python daily-preprint.py

      - name: freeloaders
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          RECIPIENT: ${{ secrets.RECIPIENT }}
          FREELOADERS: ${{ secrets.FREELOADERS }}
        run: python freeloaders.py
